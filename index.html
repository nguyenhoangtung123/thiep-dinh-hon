document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root{\n    --cream: #F1E9D8;\n    --cream-2: #E8DEC8;\n    --paper: #F7F1E1;\n    --ink: #2C231A;\n    --ink-2: #4B3E2E;\n    --mocha: #3A2E20;\n    --champagne: #A88A5C;\n    --champagne-2: #C7A877;\n    --sage: #7C7B5A;\n    --line: rgba(44,35,26,.18);\n    --serif: \"Cormorant Garamond\", \"Times New Roman\", serif;\n    --script: \"Allura\", \"Brush Script MT\", cursive;\n    --sans: \"Manrope\", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;\n  }\n  *{box-sizing:border-box;margin:0;padding:0}\n  html,body{background:var(--ink);color:var(--ink)}\n  body{\n    font-family:var(--serif);\n    font-weight:400;\n    -webkit-font-smoothing:antialiased;\n    text-rendering:optimizeLegibility;\n    overflow-x:hidden;\n  }\n  img{display:block;max-width:100%}\n  a{color:inherit}\n\n  /* ============ Reusable bits ============ */\n  .eyebrow{\n    font-family:var(--sans);\n    font-weight:500;\n    text-transform:uppercase;\n    letter-spacing:.32em;\n    font-size:11px;\n    color:var(--ink-2);\n  }\n  .rule{\n    display:flex;align-items:center;justify-content:center;gap:14px;\n    color:var(--champagne);\n  }\n  .rule::before,.rule::after{\n    content:\"\";display:block;height:1px;background:currentColor;flex:1;max-width:80px;opacity:.55;\n  }\n  .rule .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}\n  .script{font-family:var(--script);font-weight:400;font-style:normal;letter-spacing:0}\n\n  /* grain overlay for cream sections */\n  .grain{position:relative}\n  .grain::after{\n    content:\"\";position:absolute;inset:0;pointer-events:none;opacity:.5;mix-blend-mode:multiply;\n    background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 .25 0 0 0 0 .2 0 0 0 0 .15 0 0 0 .08 0'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)'/><\u002Fsvg>\");\n  }\n\n  /* Couple photo — single hero portrait on black */\n  .photo{\n    position:relative;overflow:hidden;background:#0a0805;\n    isolation:isolate;\n  }\n  .photo .slide{\n    position:absolute;inset:0;\n    background-size:contain;background-position:center center;background-repeat:no-repeat;\n    background-color:#0a0805;\n    opacity:0;transition:opacity 1.6s ease;\n    filter:sepia(.08) saturate(.95) contrast(1.02);\n  }\n  .photo .slide.is-active{opacity:1}\n  .photo::after{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background:\n      radial-gradient(120% 80% at 50% 30%, rgba(199,168,119,.06), transparent 65%),\n      linear-gradient(180deg, rgba(0,0,0,0) 80%, rgba(0,0,0,.25) 100%);\n  }\n  .photo .frameline{position:absolute;inset:10px;border:1px solid rgba(247,241,225,.22);pointer-events:none;z-index:2}\n\n  /* ============ SECTION 1 — HERO ============ */\n  .hero{\n    position:relative;min-height:100svh;\n    background:\n      linear-gradient(180deg, rgba(20,16,11,.55), rgba(20,16,11,.35) 40%, rgba(20,16,11,.7)),\n      url(\"f1698a54-91e8-4c23-932b-463e6a4f9ecb\") center/cover no-repeat,\n      linear-gradient(160deg,#3d3326 0%, #221a12 60%, #14100b 100%);\n    overflow:hidden;\n    display:grid;place-items:center;\n    padding:48px 24px;\n    color:#efe6d2;\n  }\n  .hero::before{\n    /* atmospheric noise/stems */\n    content:\"\";position:absolute;inset:-20%;pointer-events:none;\n    background-image:\n      radial-gradient(2px 22px at 12% 80%, rgba(247,241,225,.06), transparent 60%),\n      radial-gradient(1px 16px at 80% 70%, rgba(247,241,225,.05), transparent 60%),\n      radial-gradient(2px 28px at 60% 90%, rgba(247,241,225,.05), transparent 60%),\n      radial-gradient(1px 18px at 30% 88%, rgba(247,241,225,.05), transparent 60%);\    text-align:center;font-size:clamp(15px,1.6vw,17px);line-height:1.55;\n    color:var(--ink-2);max-width:38ch;margin:0 auto;\n  }\n  .card .invite-copy .script{\n    display:block;font-size:1.8em;color:var(--mocha);font-style:normal;margin-top:6px;line-height:1;\n  }\n\n  .hero .bottomline{\n    position:absolute;bottom:22px;left:24px;right:24px;display:flex;justify-content:space-between;\n    font-family:var(--sans);font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:rgba(247,241,225,.6);\n    z-index:3;\n  }\n  .hero .bottomline .mid{flex:1;text-align:center}\n\n  /* ============ SECTION 2 — SAVE THE DATE ============ */\n  .savedate{\n    background:var(--cream);\n    color:var(--ink);\n    padding:clamp(80px,12vw,140px) 24px;\n    position:relative;\n  }\n  .savedate .panel{\n    max-width:560px;margin:0 auto;text-align:center;\n    padding:64px 36px;background:var(--paper);\n    position:relative;\n  }\n  .savedate .panel::before,.savedate .panel::after{\n    content:\"\";position:absolute;left:14px;right:14px;height:1px;background:var(--line);\n  }\n  .savedate .panel::before{top:14px}\n  .savedate .panel::after{bottom:14px}\n  .savedate .inner{\n    border:1px solid var(--line);padding:54px 24px;position:relative;\n  }\n  .savedate .inner::before,.savedate .inner::after{\n    content:\"\";position:absolute;width:42px;height:42px;border:1px solid var(--champagne);opacity:.6;\n  }\n  .savedate .inner::before{top:-10px;left:-10px;border-right:none;border-bottom:none}\n  .savedate .inner::after{bottom:-10px;right:-10px;border-left:none;border-top:none}\n\n  .savedate .tag{\n    font-family:var(--sans);font-weight:500;text-transform:uppercase;letter-spacing:.42em;font-size:13px;\n    display:inline-flex;align-items:baseline;gap:.45em;color:var(--ink);margin-bottom:18px;\n  }\n  .savedate .tag .the{font-family:var(--script);text-transform:none;letter-spacing:0;font-size:1.6em;color:var(--champagne);line-height:0;position:relative;top:.18em}\n\n  .savedate .date{\n    font-family:var(--serif);font-weight:400;font-size:clamp(28px,4.2vw,40px);letter-spacing:.32em;\n    margin:6px 0 30px;color:var(--mocha);\n  }\n  .savedate .date .sep{color:var(--champagne);padding:0 .35em;font-weight:300}\n\n  .savedate .names{\n    font-family:var(--script);font-size:clamp(74px,12vw,128px);line-height:.95;\n    color:var(--mocha);margin:10px 0 0;\n  }\n  .savedate .names .and{\n    font-family:var(--sans);text-transform:uppercase;letter-spacing:.4em;font-size:13px;color:var(--ink-2);\n    display:block;margin:4px 0 -2px;font-weight:500;\n  }\n  .savedate .venue{\n    font-family:var(--serif);font-weight:500;font-style:italic;font-size:clamp(18px,2.1vw,22px);\n    color:var(--mocha);margin-top:36px;border-bottom:1px solid var(--line);display:inline-block;padding:0 14px 8px;\n  }\n  .savedate .smallcopy{\n    margin-top:24px;font-family:var(--sans);font-size:11.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-2);line-height:1.9;\n  }\n  .savedate .smallcopy em{font-style:normal;color:var(--mocha)}\n\n  /* ============ SECTION 3 — INVITATION COPY (dark editorial) ============ */\n  .invite{\n    background:\n      linear-gradient(180deg, rgba(20,16,11,.6), rgba(20,16,11,.4)),\n      linear-gradient(160deg,#3b3225 0%, #221a12 100%);\n    color:#efe6d2;padding:clamp(80px,12vw,140px) 24px;text-align:center;position:relative;overflow:hidden;\n  }\n  .invite::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:\n      radial-gradient(40% 30% at 50% 0%, rgba(168,138,92,.18), transparent 70%),\n      radial-gradient(50% 40% at 50% 100%, rgba(168,138,92,.12), transparent 70%);\n    pointer-events:none;\n  }\n  .invite .wrap{position:relative;max-width:720px;margin:0 auto}\n  .invite .eyebrow{color:rgba(239,230,210,.7)}\n  .invite h2{\n    font-family:var(--serif);font-weight:300;font-style:italic;\n    font-size:clamp(32px,5vw,52px);line-height:1.25;margin:24px 0 22px;color:#f6eed8;\n  }\n  .invite h2 .script{color:var(--champagne-2);display:block;font-size:1.5em;margin-top:8px;font-style:normal}\n  .invite p{\n    font-family:var(--serif);font-weight:300;font-size:clamp(16px,1.6vw,18px);\n    line-height:1.75;max-width:46ch;margin:0 auto;color:rgba(239,230,210,.85);\n  }\n  .invite .signature{\n    margin-top:34px;font-family:var(--script);font-size:42px;color:var(--champagne-2);\n  }\n\n  /* ============ SECTION 4 — DETAILS (3-col) ============ */\n  .details{\n    background:var(--cream);color:var(--ink);padding:clamp(80px,12vw,140px) 24px;\n  }\n  .details .head{text-align:center;margin-bottom:64px}\n  .details .head h2{\n    font-family:var(--serif);font-style:italic;font-weight:300;\n    font-size:clamp(34px,4.6vw,46px);margin-top:12px;color:var(--mocha);\n  }\n  .details .head h2 em{font-style:normal;font-family:var(--script);color:var(--champagne);font-size:1.25em;letter-spacing:0;padding:0 .1em}\n  .details .grid{\n    max-width:980px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:0;\n    background:var(--paper);border:1px solid var(--line);\n  }\n  .details .cell{\n    padding:48px 28px;text-align:center;border-right:1px solid var(--line);position:relative;\n  }\n  .details .cell:last-child{border-right:none}\n  .details .cell .icon{\n    width:44px;height:44px;margin:0 auto 18px;color:var(--champagne);\n    display:grid;place-items:center;\n  }\n  .details .cell .icon svg{width:100%;height:100%;display:block}\n  .details .cell .label{\n    font-family:var(--sans);text-transform:uppercase;letter-spacing:.36em;font-size:11px;color:var(--ink-2);margin-bottom:14px;\n  }\n  .details .cell .big{\n    font-family:var(--serif);font-weight:400;font-size:clamp(22px,2.6vw,28px);line-height:1.25;color:var(--mocha);\n  }\n  .details .cell .big .script{font-family:var(--script);color:var(--champagne);font-size:1.3em;line-height:0;position:relative;top:.1em;padding:0 .1em}\n  .details .cell .sub{\n    font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink-2);margin-top:8px;line-height:1.5;\n  }\n\n  /* ============ SECTION 5 — COUNTDOWN ============ */\n  .countdown{\n    background:\n      linear-gradient(180deg,#1d160e,#2a2014);\n    color:#efe6d2;padding:clamp(80px,12vw,130px) 24px;text-align:center;position:relative;\n  }\n  .countdown::after{\n    content:\"\";position:absolute;inset:0;pointer-events:none;\n    background-image:\n      radial-gradient(60% 40% at 50% 50%, rgba(199,168,119,.1), transparent 70%);\n  }\n  .countdown .wrap{position:relative;max-width:880px;margin:0 auto}\n  .countdown .eyebrow{color:rgba(239,230,210,.7)}\n  .countdown h2{\n    font-family:var(--serif);font-style:italic;font-weight:300;\n    font-size:clamp(30px,4.2vw,42px);margin:14px 0 8px;color:#f6eed8;\n  }\n  .countdown .untildate{\n    font-family:var(--sans);text-transform:uppercase;letter-spacing:.36em;font-size:12px;color:rgba(239,230,210,.7);margin-bottom:50px;\n  }\n  .countdown .nums{\n    display:grid;grid-template-columns:repeat(4,1fr);gap:0;\n    border-top:1px solid rgba(199,168,119,.35);\n    border-bottom:1px solid rgba(199,168,119,.35);\n    padding:32px 0;\n  }\n  .countdown .unit{position:relative}\n  .countdown .unit + .unit::before{\n    content:\"\";position:absolute;left:0;top:18%;bottom:18%;width:1px;background:rgba(199,168,119,.25);\n  }\n  .countdown .val{\n    font-family:var(--serif);font-weight:300;font-size:clamp(48px,9vw,96px);line-height:1;color:#f6eed8;\n    font-variant-numeric:tabular-nums;letter-spacing:.02em;\n  }\n  .countdown .lab{\n    margin-top:14px;font-family:var(--sans);text-transform:uppercase;letter-spacing:.38em;font-size:11px;color:var(--champagne-2);\n  }\n\n  /* ============ SECTION 6 — VENUE / MAP ============ */\n  .venue{\n    background:var(--cream);color:var(--ink);padding:clamp(80px,12vw,140px) 24px;\n  }\n  .venue .wrap{\n    max-width:1060px;margin:0 auto;display:grid;grid-template-columns:1fr 1.1fr;gap:0;\n    background:var(--paper);border:1px solid var(--line);overflow:hidden;\n  }\n  .venue .info{\n    padding:clamp(40px,5vw,68px);display:flex;flex-direction:column;justify-content:center;gap:18px;\n  }\n  .venue .info .eyebrow{color:var(--ink-2)}\n  .venue .info h2{\n    font-family:var(--serif);font-style:italic;font-weight:300;font-size:clamp(30px,3.4vw,40px);color:var(--mocha);line-height:1.15;\n  }\n  .venue .info h2 em{font-family:var(--script);font-style:normal;color:var(--champagne);font-size:1.1em;padding:0 .1em}\n  .venue .info .addr{\n    font-family:var(--serif);font-size:17px;line-height:1.6;color:var(--ink);\n  }\n  .venue .info .addr strong{font-weight:500}\n  .venue .info .meta{\n    display:grid;grid-template-columns:auto 1fr;gap:10px 18px;font-family:var(--serif);font-size:15px;color:var(--ink-2);\n    border-top:1px solid var(--line);padding-top:18px;margin-top:8px;\n  }\n  .venue .info .meta dt{\n    font-family:var(--sans);text-transform:uppercase;letter-spacing:.28em;font-size:10.5px;color:var(--ink-2);padding-top:3px;\n  }\n  .venue .info .meta dd{color:var(--mocha)}\n  .venue .info .actions{\n    display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;\n  }\n  .venue .info .actions a{\n    text-decoration:none;\n    font-family:var(--sans);text-transform:uppercase;letter-spacing:.3em;font-size:11px;\n    padding:14px 22px;border:1px solid var(--ink);color:var(--ink);\n    transition:background .25s ease,color .25s ease;\n  }\n  .venue .info .actions a.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}\n  .venue .info .actions a:hover{background:var(--champagne);border-color:var(--champagne);color:var(--paper)}\n  .venue .info .actions a.primary:hover{background:var(--mocha);border-color:var(--mocha)}\n\n  .venue .map{\n    position:relative;min-height:380px;\n    background:#dfd3b8;\n    overflow:hidden;\n  }\n  .venue .map iframe{position:absolute;inset:0;width:100%;height:100%;border:0;filter:saturate(.78) contrast(.92) sepia(.18)}\n  .venue .map .pin{\n
